services:
  - type: web
    name: securescope-ai-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: securescope-ai-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://securescope-ai.onrender.com
  - type: static
    name: securescope-ai
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://securescope-ai-api.onrender.com/api
databases:
  - name: securescope-ai-db
    plan: starter
